name: 🚨 Clone Alert Broadcaster
on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Clone Stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(curl -H "Authorization: token $GITHUB_TOKEN" \
          https://api.github.com/repos/FatherTimeSDKP/FatherTimeSDKP/traffic/clones \
          | jq '.count')
          if [ "$COUNT" -gt 0 ]; then
            echo "CLONE DETECTED: Total Clones today is $COUNT"
            # Here we can add a step to post to X or Issue #45
          fi
