name: Sovereign Forensic Audit

# TRIGGER: Run this audit every time you push code OR once a day at midnight
on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'  # Daily "Heartbeat" Scan

permissions:
  contents: write

jobs:
  audit_scan:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out your code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. Install Math Libraries
    - name: Install Dependencies
      run: |
        pip install numpy

    # 4. EXECUTE THE AUDIT (Run the script and save output to log.txt)
    - name: Run Sovereign Auditor
      run: |
        python auditor.py > forensic_log.txt
        echo "Scan Complete. Timestamping..."

    # 5. Commit the Log (Evidence) back to the Repo
    - name: Commit Forensic Log
      run: |
        git config --global user.name 'SovereignBot'
        git config --global user.email 'bot@fathertimesdkp.com'
        git add forensic_log.txt
        git commit -m "AUTO-AUDIT: Verified VFE Signature" || echo "No changes to log"
        git push
