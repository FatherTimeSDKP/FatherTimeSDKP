          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "⚠️ ALERT: TTP Handshake - Artemis II Sync Detected"
          to: "dallasnamiyadaddy@gmail.com"
          from: "FatherTimeSDKP Framework <dallasnamiyadaddy@gmail.com>"
          body: |
